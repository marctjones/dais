name: CI

on:
  pull_request:
  push:
    branches:
      - main

env:
  CARGO_TERM_COLOR: always
  SLINT_BACKEND: software

jobs:
  ci-safe-gates:
    name: CI-safe hardening gates
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Linux GUI build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libfontconfig1-dev libxkbcommon-dev pkg-config

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
          components: rustfmt

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2

      - name: Format check
        run: |
          cargo fmt --manifest-path core/Cargo.toml --check
          cargo fmt --manifest-path client-core/Cargo.toml --check
          cargo fmt --manifest-path client/Cargo.toml --check
          cargo fmt --manifest-path platforms/cloudflare/bindings/Cargo.toml --check
          cargo fmt --manifest-path platforms/cloudflare/workers/router/Cargo.toml --check
          cargo fmt --manifest-path apps/dais-desk/Cargo.toml --check

      - name: Implementation honesty audit
        run: scripts/audit-implementation-honesty.sh

      - name: E2EE and MLS static audit
        run: scripts/audit-e2ee-mls-security.sh --check-only

      - name: Backup restore self-test
        run: scripts/verify-backup-restore.sh --self-test

      - name: Managed health self-test
        run: scripts/managed-health-check.sh --self-test --jsonl-out tmp/managed-health-self-test.jsonl

      - name: Core tests
        run: cargo test --manifest-path core/Cargo.toml

      - name: Core MLS tests
        run: cargo test --manifest-path core/Cargo.toml --features mls

      - name: Client-core tests
        run: cargo test --manifest-path client-core/Cargo.toml

      - name: Client tests
        run: cargo test --manifest-path client/Cargo.toml

      - name: Cloudflare bindings tests
        run: cargo test --manifest-path platforms/cloudflare/bindings/Cargo.toml

      - name: Router tests
        run: cargo test --manifest-path platforms/cloudflare/workers/router/Cargo.toml

      - name: Router wasm check
        run: cargo check --manifest-path platforms/cloudflare/workers/router/Cargo.toml --target wasm32-unknown-unknown

      - name: Dais Desk tests and visual smoke
        run: cargo test --manifest-path apps/dais-desk/Cargo.toml

      - name: Upload hardening reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: hardening-reports
          path: |
            tmp/implementation-honesty-*/report.md
            tmp/e2ee-mls-security-*/report.md
            apps/dais-desk/target/dais-desk-screenshots/*.png
          if-no-files-found: ignore
