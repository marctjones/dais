[package]
name = "dais-vercel"
version = "1.2.0"
edition = "2021"
authors = ["Marc Jones <marc@joneslaw.io>"]
license = "MIT"
description = "Vercel Edge Functions bindings for dais"
repository = "https://github.com/marctjones/dais"

[dependencies]
dais-core = { path = "../../../core" }
async-trait = "0.1"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
tokio = { version = "1.0", features = ["full"] }
tokio-postgres = { version = "0.7", features = ["with-serde_json-1"] }
reqwest = { version = "0.11", features = ["json"] }
thiserror = "1.0"
chrono = "0.4"

[lib]
name = "dais_vercel"
path = "src/lib.rs"
