[package]
name = "webfinger-vercel"
version = "1.2.0"
edition = "2021"

[lib]
crate-type = ["cdylib"]

[dependencies]
dais-core = { path = "../../../../core" }
dais-vercel = { path = "../../bindings" }
vercel_runtime = "1.1"
tokio = { version = "1.0", features = ["full"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"

[profile.release]
opt-level = "z"
lto = true
codegen-units = 1
