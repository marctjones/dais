name = "delivery-queue"
main = "build/worker/shim.mjs"
compatibility_date = "2025-01-04"

[build]
command = 'PATH="/opt/homebrew/opt/rustup/bin:$PATH" cargo install -q worker-build --version 0.8.4 --locked && PATH="/opt/homebrew/opt/rustup/bin:$PATH" $HOME/.cargo/bin/worker-build --release'

# D1 database for tracking deliveries
[[d1_databases]]
binding = "DB"
database_name = "dais-social"
database_id = "f90f9da8-136c-40c6-b96a-eba38d7efa65"

# R2 for media (if needed for attachments)
[[r2_buckets]]
binding = "MEDIA_BUCKET"
bucket_name = "dais-media"

[env.production]
name = "delivery-queue-production"

[[env.production.queues.producers]]
binding = "DELIVERY_QUEUE"
queue = "delivery-queue"

[[env.production.queues.consumers]]
queue = "delivery-queue"
max_batch_size = 10
max_batch_timeout = 30
max_retries = 3
dead_letter_queue = "delivery-dlq"

[[env.production.d1_databases]]
binding = "DB"
database_name = "dais-social"
database_id = "f90f9da8-136c-40c6-b96a-eba38d7efa65"

[[env.production.r2_buckets]]
binding = "MEDIA_BUCKET"
bucket_name = "dais-media"

[env.production.vars]
DOMAIN = "dais.social"
ACTIVITYPUB_DOMAIN = "social.dais.social"

[env.skpt]
name = "delivery-queue-skpt"

[[env.skpt.queues.producers]]
binding = "DELIVERY_QUEUE"
queue = "delivery-queue-skpt"

[[env.skpt.queues.consumers]]
queue = "delivery-queue-skpt"
max_batch_size = 10
max_batch_timeout = 30
max_retries = 3
dead_letter_queue = "delivery-dlq-skpt"

[[env.skpt.d1_databases]]
binding = "DB"
database_name = "dais-skpt"
database_id = "39490363-8871-4c24-b28e-4873e6a25a0a"

[[env.skpt.r2_buckets]]
binding = "MEDIA_BUCKET"
bucket_name = "dais-media-skpt"

[env.skpt.vars]
DOMAIN = "skpt.cl"
ACTIVITYPUB_DOMAIN = "social.skpt.cl"
