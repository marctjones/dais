[package]
name = "router-rust"
version = "0.1.0"
edition = "2021"

[lib]
crate-type = ["cdylib"]

[dependencies]
base64 = "0.22"
console_error_panic_hook = "0.1"
js-sys = "0.3"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
sha2 = "0.10"
urlencoding = "2.1"
wasm-bindgen = "0.2"
worker = { version = "0.8", features = ["d1"] }

[profile.release]
opt-level = "z"
lto = true
codegen-units = 1
