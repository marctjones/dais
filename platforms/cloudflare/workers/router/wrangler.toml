name = "router"
main = "build/worker/shim.mjs"
compatibility_date = "2025-01-04"

[build]
command = 'PATH="/opt/homebrew/opt/rustup/bin:$PATH" cargo install -q worker-build --version 0.8.4 --locked && PATH="/opt/homebrew/opt/rustup/bin:$PATH" $HOME/.cargo/bin/worker-build --release'

# R2 bucket for serving media files
[[r2_buckets]]
binding = "MEDIA_BUCKET"
bucket_name = "dais-media"

[[d1_databases]]
binding = "DB"
database_name = "dais-social"
database_id = "f90f9da8-136c-40c6-b96a-eba38d7efa65"

[ai]
binding = "AI"

# Personal Bluesky AppView firehose consumer (issue #50, Track B).
#
# STEP 1 OF 2 (issue #377 force-restart): the binding is deliberately removed
# here -- Cloudflare requires a `deleted_classes` migration to ship in the
# same deploy as removing the binding that references it. Once this deploys
# to both environments, step 2 re-adds the binding below plus a
# `new_sqlite_classes` migration recreating the class fresh. See the v2
# migration entry for why this force-restart is needed at all.

[[migrations]]
tag = "v1"
new_sqlite_classes = ["FirehoseSubscription"]

# v2: force-restart every existing FirehoseSubscription instance after the
# Jetstream rewrite (issue #377). A code-only deploy does not evict a live DO
# instance whose outbound WebSocket is still open -- Cloudflare's own docs:
# "eviction is deferred until all outbound connections have closed" -- so an
# instance that had already opened the old raw-relay connection would keep
# running the old code indefinitely. Deleting then recreating the class is
# the documented way to force a hard reset. Only the DO's own internal
# storage (alarm scheduling) is lost; all real data lives in D1.
[[migrations]]
tag = "v2"
deleted_classes = ["FirehoseSubscription"]

[triggers]
crons = ["*/30 * * * *"]

[env.production]
name = "router-production"
routes = [
  { pattern = "social.dais.social", custom_domain = true }
]

[[env.production.r2_buckets]]
binding = "MEDIA_BUCKET"
bucket_name = "dais-media"

[[env.production.d1_databases]]
binding = "DB"
database_name = "dais-social"
database_id = "f90f9da8-136c-40c6-b96a-eba38d7efa65"

[env.production.ai]
binding = "AI"

[env.production.triggers]
crons = ["*/30 * * * *"]

[env.production.vars]
ENVIRONMENT = "production"
DOMAIN = "dais.social"
ACTIVITYPUB_DOMAIN = "social.dais.social"
USERNAME = "social"
WEBFINGER_URL = "https://webfinger-production.marc-t-jones.workers.dev"
ACTOR_URL = "https://actor-production.marc-t-jones.workers.dev"
INBOX_URL = "https://inbox-production.marc-t-jones.workers.dev"
OUTBOX_URL = "https://outbox-production.marc-t-jones.workers.dev"
PDS_URL = "https://pds-production.marc-t-jones.workers.dev"
DELIVERY_QUEUE_URL = "https://delivery-queue-production.marc-t-jones.workers.dev"

[env.skpt]
name = "router-skpt"
routes = [
  { pattern = "social.skpt.cl", custom_domain = true }
]

[[env.skpt.r2_buckets]]
binding = "MEDIA_BUCKET"
bucket_name = "dais-media-skpt"

[[env.skpt.d1_databases]]
binding = "DB"
database_name = "dais-skpt"
database_id = "39490363-8871-4c24-b28e-4873e6a25a0a"

[env.skpt.ai]
binding = "AI"

[env.skpt.triggers]
crons = ["*/30 * * * *"]

[env.skpt.vars]
ENVIRONMENT = "skpt"
DOMAIN = "skpt.cl"
ACTIVITYPUB_DOMAIN = "social.skpt.cl"
USERNAME = "social"
WEBFINGER_URL = "https://webfinger-skpt.marc-t-jones.workers.dev"
ACTOR_URL = "https://actor-skpt.marc-t-jones.workers.dev"
INBOX_URL = "https://inbox-skpt.marc-t-jones.workers.dev"
OUTBOX_URL = "https://outbox-skpt.marc-t-jones.workers.dev"
PDS_URL = "https://pds-skpt.marc-t-jones.workers.dev"
DELIVERY_QUEUE_URL = "https://delivery-queue-skpt.marc-t-jones.workers.dev"
