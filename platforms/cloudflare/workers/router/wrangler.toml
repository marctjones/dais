name = "router"
main = "build/worker/shim.mjs"
compatibility_date = "2025-01-04"

[build]
command = 'PATH="/opt/homebrew/opt/rustup/bin:$PATH" cargo install -q worker-build --version 0.8.4 --locked && PATH="/opt/homebrew/opt/rustup/bin:$PATH" $HOME/.cargo/bin/worker-build --release'

# R2 bucket for serving media files
[[r2_buckets]]
binding = "MEDIA_BUCKET"
bucket_name = "dais-media"

[[d1_databases]]
binding = "DB"
database_name = "dais-social"
database_id = "f90f9da8-136c-40c6-b96a-eba38d7efa65"

[ai]
binding = "AI"

[triggers]
crons = ["*/30 * * * *"]

[env.production]
name = "router-production"
routes = [
  { pattern = "social.dais.social", custom_domain = true }
]

[[env.production.r2_buckets]]
binding = "MEDIA_BUCKET"
bucket_name = "dais-media"

[[env.production.d1_databases]]
binding = "DB"
database_name = "dais-social"
database_id = "f90f9da8-136c-40c6-b96a-eba38d7efa65"

[env.production.ai]
binding = "AI"

[env.production.triggers]
crons = ["*/30 * * * *"]

[env.production.vars]
ENVIRONMENT = "production"
WEBFINGER_URL = "https://webfinger-production.marc-t-jones.workers.dev"
ACTOR_URL = "https://actor-production.marc-t-jones.workers.dev"
INBOX_URL = "https://inbox-production.marc-t-jones.workers.dev"
OUTBOX_URL = "https://outbox-production.marc-t-jones.workers.dev"
PDS_URL = "https://pds-production.marc-t-jones.workers.dev"
DELIVERY_QUEUE_URL = "https://delivery-queue-production.marc-t-jones.workers.dev"
