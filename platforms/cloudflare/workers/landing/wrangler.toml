name = "landing"
main = "build/worker/shim.mjs"
compatibility_date = "2025-01-04"

[build]
command = "cargo install -q worker-build --version '^0.7' && worker-build --release"

[vars]
DOMAIN = "dais.social"
ACTIVITYPUB_DOMAIN = "social.dais.social"
USERNAME = "social"

[env.production]
name = "landing-production"
routes = [
  { pattern = "dais.social", custom_domain = true },
  { pattern = "www.dais.social", custom_domain = true }
]

[env.production.vars]
DOMAIN = "dais.social"
ACTIVITYPUB_DOMAIN = "social.dais.social"
USERNAME = "social"
