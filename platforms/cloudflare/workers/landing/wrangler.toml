name = "landing"
main = "build/worker/shim.mjs"
compatibility_date = "2025-01-04"

[build]
command = 'PATH="/opt/homebrew/opt/rustup/bin:$PATH" cargo install -q worker-build --version 0.8.4 --locked && PATH="/opt/homebrew/opt/rustup/bin:$PATH" $HOME/.cargo/bin/worker-build --release'

[vars]
DOMAIN = "dais.social"
ACTIVITYPUB_DOMAIN = "social.dais.social"
USERNAME = "social"
WEBFINGER_URL = "https://webfinger.marc-t-jones.workers.dev"

[env.production]
name = "landing-production"
routes = [
  { pattern = "dais.social", custom_domain = true },
  { pattern = "www.dais.social", custom_domain = true }
]

[env.production.vars]
DOMAIN = "dais.social"
ACTIVITYPUB_DOMAIN = "social.dais.social"
USERNAME = "social"
WEBFINGER_URL = "https://webfinger-production.marc-t-jones.workers.dev"

[env.skpt]
name = "landing-skpt"
routes = [
  { pattern = "skpt.cl/.well-known/webfinger*", zone_name = "skpt.cl" }
]

[env.skpt.vars]
DOMAIN = "skpt.cl"
ACTIVITYPUB_DOMAIN = "social.skpt.cl"
USERNAME = "social"
WEBFINGER_URL = "https://webfinger-skpt.marc-t-jones.workers.dev"
