name = "pds"
main = "build/worker/shim.mjs"
compatibility_date = "2025-01-04"

[build]
command = 'PATH="/opt/homebrew/opt/rustup/bin:$PATH" cargo install -q worker-build --version 0.8.4 --locked && PATH="/opt/homebrew/opt/rustup/bin:$PATH" $HOME/.cargo/bin/worker-build --release'

[vars]
DOMAIN = "social.dais.social"
PDS_HOSTNAME = "pds.dais.social"

# D1 database for AT Protocol records
[[d1_databases]]
binding = "DB"
database_name = "dais-social"
database_id = "f90f9da8-136c-40c6-b96a-eba38d7efa65"

[[r2_buckets]]
binding = "MEDIA_BUCKET"
bucket_name = "dais-media"

# NOTE: The RELAY_SUBSCRIPTION Durable Object (firehose/subscribeRepos) from the
# v1.0 pds is intentionally omitted — the refactored (core-based) pds does not yet
# implement the RelaySubscription class. AT Protocol firehose is experimental and
# tracked separately (#46/#50). Re-add the durable_objects + migrations blocks
# once the DO is implemented in core.

[env.production]
name = "pds-production"
routes = [
  { pattern = "pds.dais.social", custom_domain = true }
]

[env.production.vars]
DOMAIN = "social.dais.social"
PDS_HOSTNAME = "pds.dais.social"

[[env.production.d1_databases]]
binding = "DB"
database_name = "dais-social"
database_id = "f90f9da8-136c-40c6-b96a-eba38d7efa65"

[[env.production.r2_buckets]]
binding = "MEDIA_BUCKET"
bucket_name = "dais-media"

[env.skpt]
name = "pds-skpt"
routes = [
  { pattern = "pds.skpt.cl", custom_domain = true }
]

[env.skpt.vars]
DOMAIN = "social.skpt.cl"
PDS_HOSTNAME = "pds.skpt.cl"

[[env.skpt.d1_databases]]
binding = "DB"
database_name = "dais-skpt"
database_id = "39490363-8871-4c24-b28e-4873e6a25a0a"

[[env.skpt.r2_buckets]]
binding = "MEDIA_BUCKET"
bucket_name = "dais-media-skpt"
