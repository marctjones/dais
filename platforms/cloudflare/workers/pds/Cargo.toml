[package]
name = "pds-refactored"
version = "1.1.0"
edition = "2021"

[lib]
crate-type = ["cdylib"]

[dependencies]
worker = { version = "0.8", features = ["d1"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
console_error_panic_hook = "0.1"
cid = "0.11"
multihash-codetable = { version = "0.2", features = ["sha2"] }
sha2 = "0.10"
k256 = { version = "0.13", features = ["ecdsa"] }
multibase = "0.9"
ipld-core = "0.4"
serde_ipld_dagcbor = "0.6"
serde_bytes = "0.11"

# Platform-agnostic core
dais-core = { path = "../../../../core" }

# Cloudflare platform bindings
dais-cloudflare = { path = "../../bindings" }

[profile.release]
opt-level = "z"
lto = true
codegen-units = 1
