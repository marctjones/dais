[package]
name = "pds-refactored"
version = "1.1.0"
edition = "2021"

[lib]
crate-type = ["cdylib"]

[dependencies]
worker = { version = "0.7.2", features = ["d1"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
console_error_panic_hook = "0.1"

# Platform-agnostic core
dais-core = { path = "../../../../core" }

# Cloudflare platform bindings
dais-cloudflare = { path = "../../bindings" }

[profile.release]
opt-level = "z"
lto = true
codegen-units = 1
