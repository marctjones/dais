[package]
name = "actor-refactored"
version = "1.1.0"
edition = "2021"

[lib]
crate-type = ["cdylib"]

[dependencies]
# Core dais library (platform-agnostic)
dais-core = { path = "../../../../core" }

# Cloudflare platform bindings
dais-cloudflare = { path = "../../bindings" }

# Cloudflare Workers runtime
worker = { version = "0.7.2", features = ["d1"] }

# Async runtime
async-trait = "0.1"

# Serialization
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"

# Error handling
console_error_panic_hook = "0.1"

# Shared code for theme support (HTML rendering)
shared = { path = "../../../../workers/shared" }

[profile.release]
opt-level = "z"
lto = true
codegen-units = 1
