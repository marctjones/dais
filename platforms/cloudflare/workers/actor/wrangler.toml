name = "actor"
main = "build/worker/shim.mjs"
compatibility_date = "2025-01-04"

[vars]
THEME = "cat-light"

[build]
command = 'PATH="/opt/homebrew/opt/rustup/bin:$PATH" cargo install -q worker-build --version 0.8.4 --locked && PATH="/opt/homebrew/opt/rustup/bin:$PATH" $HOME/.cargo/bin/worker-build --release'

# Custom domain routes for Actor endpoint
# Commented out for local development (not supported in local mode)
# routes = [
#   { pattern = "social.dais.social/users/*", custom_domain = true }
# ]

[env.production]
name = "actor-production"
# No custom domain routes - actor is accessed via router worker

[env.production.vars]
DOMAIN = "dais.social"
ACTIVITYPUB_DOMAIN = "social.dais.social"
THEME = "cat-light"

[[env.production.d1_databases]]
binding = "DB"
database_name = "dais-social"
database_id = "f90f9da8-136c-40c6-b96a-eba38d7efa65"

[[env.production.queues.producers]]
binding = "DELIVERY_QUEUE"
queue = "delivery-queue"

[env.skpt]
name = "actor-skpt"

[env.skpt.vars]
DOMAIN = "skpt.cl"
ACTIVITYPUB_DOMAIN = "social.skpt.cl"
THEME = "cat-light"

[[env.skpt.d1_databases]]
binding = "DB"
database_name = "dais-skpt"
database_id = "39490363-8871-4c24-b28e-4873e6a25a0a"

[[env.skpt.queues.producers]]
binding = "DELIVERY_QUEUE"
queue = "delivery-queue-skpt"

# D1 database for actor data
[[d1_databases]]
binding = "DB"
database_name = "dais-social"
database_id = "f90f9da8-136c-40c6-b96a-eba38d7efa65"
