name = "outbox"
main = "build/worker/shim.mjs"
compatibility_date = "2025-01-04"

[vars]
DOMAIN = "dais.social"
ACTIVITYPUB_DOMAIN = "social.dais.social"
THEME = "cat-light"

[build]
command = "cargo install -q worker-build && worker-build --release"

[env.production]
name = "outbox-production"
# No custom domain routes - outbox is accessed via router worker

[env.production.vars]
DOMAIN = "dais.social"
ACTIVITYPUB_DOMAIN = "social.dais.social"
THEME = "cat-light"

[[env.production.d1_databases]]
binding = "DB"
database_name = "dais-social"
database_id = "f90f9da8-136c-40c6-b96a-eba38d7efa65"

# D1 database for retrieving posts
[[d1_databases]]
binding = "DB"
database_name = "dais-social"
database_id = "f90f9da8-136c-40c6-b96a-eba38d7efa65"

# R2 bucket for media attachments
[[r2_buckets]]
binding = "MEDIA_BUCKET"
bucket_name = "dais-media"

[[env.production.r2_buckets]]
binding = "MEDIA_BUCKET"
bucket_name = "dais-media"
