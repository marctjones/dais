name = "inbox"
main = "build/worker/shim.mjs"
compatibility_date = "2025-01-04"

[build]
command = "cargo install -q worker-build && worker-build --release"

# Custom domain routes for Inbox endpoint
# Commented out for local development (not supported in local mode)
# routes = [
#   { pattern = "social.dais.social/users/*/inbox", custom_domain = true }
# ]

[env.production]
name = "inbox-production"
# No custom domain routes - inbox is accessed via router worker

[env.production.vars]
DOMAIN = "dais.social"
ACTIVITYPUB_DOMAIN = "social.dais.social"

[[env.production.d1_databases]]
binding = "DB"
database_name = "dais-social"
database_id = "f90f9da8-136c-40c6-b96a-eba38d7efa65"

# D1 database for storing activities and followers
[[d1_databases]]
binding = "DB"
database_name = "dais-social"
database_id = "f90f9da8-136c-40c6-b96a-eba38d7efa65"
